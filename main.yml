name: etl pipeline
on:
    push:
        branches:
            - main

jobs:
    extract-data-job:
         runs-on: ubuntu-latest
         steps:
            - name: Checout code
              uses: actions/checkout@v2
            - name: Run extract.py
              run: python extract.py
    transform-data-job:
        runs-on: ubuntu-latest
        needs: extract-data-job
        steps:
            - name: Checout code
              uses: actions/checkout@v2
            - name: Run transform.py
              run: python transform.py
    load-data-job:
        runs-on: ubuntu-latest
        needs: transform-data-job
        steps:
            - name: Checout code
              uses: actions/checkout@v2
            - name: Run load.py
              run: python load.py


